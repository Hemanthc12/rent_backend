<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="theme-color" content="#0f766e" />
<title>Rent Manager</title>
<style>
  :root{
    --bg:#eef2f7;
    --bg-grad-1:#0f766e;
    --bg-grad-2:#0e7490;
    --card:#ffffff;
    --ink:#0f172a;
    --muted:#64748b;
    --line:#e2e8f0;
    --primary:#0f766e;
    --primary-d:#0c5d57;
    --accent:#0ea5e9;
    --green:#16a34a;
    --green-bg:#dcfce7;
    --amber:#d97706;
    --amber-bg:#fef3c7;
    --red:#dc2626;
    --red-bg:#fee2e2;
    --shadow:0 10px 30px rgba(15,23,42,.08);
    --shadow-sm:0 2px 8px rgba(15,23,42,.06);
    --radius:18px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer;border:none}
  input,select{font-family:inherit}

  /* ---------- App shell ---------- */
  .app{max-width:680px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

  .topbar{
    background:linear-gradient(135deg,var(--bg-grad-1),var(--bg-grad-2));
    color:#fff;padding:18px 18px 22px;border-radius:0 0 26px 26px;
    box-shadow:var(--shadow);position:sticky;top:0;z-index:20;
  }
  .topbar-row{display:flex;align-items:center;gap:12px}
  .logo{
    width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.18);
    display:grid;place-items:center;font-size:22px;font-weight:800;flex:0 0 auto;
    backdrop-filter:blur(4px);
  }
  .brand h1{margin:0;font-size:19px;font-weight:700;letter-spacing:.2px}
  .brand p{margin:1px 0 0;font-size:12px;opacity:.85}
  .topbar-actions{margin-left:auto;display:flex;gap:8px}
  .icon-btn{
    width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.16);
    color:#fff;display:grid;place-items:center;transition:.15s;font-size:17px;
  }
  .icon-btn:active{transform:scale(.92);background:rgba(255,255,255,.28)}

  /* ---------- Tabs ---------- */
  .tabs{
    display:flex;gap:6px;margin-top:16px;background:rgba(255,255,255,.15);
    padding:5px;border-radius:14px;
  }
  .tab{
    flex:1;padding:9px 0;border-radius:10px;background:transparent;color:#fff;
    font-size:14px;font-weight:600;opacity:.8;transition:.15s;
  }
  .tab.active{background:#fff;color:var(--primary);opacity:1;box-shadow:var(--shadow-sm)}

  /* ---------- Content ---------- */
  .content{flex:1;padding:18px 16px 90px}
  .view{display:none;animation:fade .25s ease}
  .view.active{display:block}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .section-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;
    letter-spacing:.6px;margin:4px 2px 10px}

  /* ---------- Stats ---------- */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px}
  .stat{background:var(--card);border-radius:var(--radius);padding:14px 12px;box-shadow:var(--shadow-sm)}
  .stat .val{font-size:20px;font-weight:800;letter-spacing:-.3px}
  .stat .lbl{font-size:11px;color:var(--muted);margin-top:3px;font-weight:600}
  .stat.green .val{color:var(--green)}
  .stat.amber .val{color:var(--amber)}

  /* ---------- Shed cards ---------- */
  .shed{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-sm);
    margin-bottom:14px;overflow:hidden;border:1px solid var(--line)}
  .shed-head{display:flex;align-items:center;gap:12px;padding:15px 16px}
  .shed-ic{width:44px;height:44px;border-radius:13px;display:grid;place-items:center;
    font-size:20px;flex:0 0 auto;color:#fff}
  .shed-ic.c1{background:linear-gradient(135deg,#0ea5e9,#2563eb)}
  .shed-ic.c2{background:linear-gradient(135deg,#8b5cf6,#6366f1)}
  .shed-ic.c3{background:linear-gradient(135deg,#f59e0b,#ef4444)}
  .shed-meta{flex:1 1 auto;min-width:0}
  .shed-name-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .shed-name{font-size:16px;font-weight:700}
  .shed-sub{font-size:12.5px;color:var(--muted);margin-top:3px;white-space:nowrap;
    overflow:hidden;text-overflow:ellipsis}
  .pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;
    font-size:11px;font-weight:700;flex:0 0 auto;white-space:nowrap}
  .pill.due{background:var(--amber-bg);color:var(--amber)}
  .pill.ok{background:var(--green-bg);color:var(--green)}

  .shed-body{padding:0 16px 16px;border-top:1px solid var(--line)}
  .field-row{display:flex;gap:10px;margin-top:12px}
  .field{flex:1;min-width:0}
  .field label{display:block;font-size:11px;font-weight:700;color:var(--muted);
    margin:0 0 5px 2px;text-transform:uppercase;letter-spacing:.4px}
  .field .control{
    width:100%;padding:11px 12px;border:1.5px solid var(--line);border-radius:12px;
    font-size:15px;background:#f8fafc;transition:.15s;color:var(--ink)}
  .field .control:focus{outline:none;border-color:var(--primary);background:#fff;
    box-shadow:0 0 0 3px rgba(15,118,110,.12)}
  .amt-wrap{position:relative}
  .amt-wrap .rs{position:absolute;left:12px;top:50%;transform:translateY(-50%);
    color:var(--muted);font-weight:700;font-size:15px;pointer-events:none}
  .amt-wrap .control{padding-left:26px}

  .btn{
    width:100%;margin-top:13px;padding:13px;border-radius:13px;background:var(--primary);
    color:#fff;font-size:15px;font-weight:700;transition:.15s;display:flex;
    align-items:center;justify-content:center;gap:8px}
  .btn:active{transform:scale(.98);background:var(--primary-d)}
  .btn:disabled{opacity:.55;pointer-events:none}
  .btn.ghost{background:#f1f5f9;color:var(--ink)}
  .btn.danger{background:var(--red-bg);color:var(--red)}

  .all-paid{padding:16px;text-align:center;color:var(--green);font-weight:600;font-size:14px;
    background:var(--green-bg);border-top:1px solid var(--line)}

  /* ---------- History ---------- */
  .filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:10px;margin-bottom:6px;
    scrollbar-width:none}
  .filters::-webkit-scrollbar{display:none}
  .chip{padding:8px 14px;border-radius:999px;background:var(--card);border:1.5px solid var(--line);
    font-size:13px;font-weight:600;color:var(--muted);white-space:nowrap;transition:.15s}
  .chip.active{background:var(--primary);color:#fff;border-color:var(--primary)}
  .search{width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:12px;
    font-size:15px;background:var(--card);margin-bottom:14px}
  .search:focus{outline:none;border-color:var(--primary)}

  .table-wrap{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow-sm);
    overflow-x:auto;overflow-y:hidden;border:1px solid var(--line);-webkit-overflow-scrolling:touch}
  table{width:100%;border-collapse:collapse}
  th,td{padding:12px 10px;text-align:left;font-size:13px;border-bottom:1px solid var(--line)}
  th{background:#f8fafc;font-size:11px;text-transform:uppercase;letter-spacing:.4px;
    color:var(--muted);font-weight:700;position:sticky;top:0}
  td:first-child,th:first-child{padding-left:14px}
  tr:last-child td{border-bottom:none}
  .mcell{font-weight:700;white-space:nowrap}
  .cell{cursor:pointer;border-radius:8px;transition:.12s;white-space:nowrap}
  .cell .amt{font-weight:700;color:var(--green);font-size:13.5px}
  .cell .dt{font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap}
  .cell .pending{color:var(--amber);font-weight:700;font-size:12px}
  .cell:active{background:#f1f5f9}
  .tap-hint{text-align:center;font-size:12px;color:var(--muted);margin-top:12px}

  .legend{display:flex;gap:16px;justify-content:center;margin-top:14px;flex-wrap:wrap}
  .legend span{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .dot{width:9px;height:9px;border-radius:50%}
  .dot.g{background:var(--green)}.dot.a{background:var(--amber)}

  /* ---------- Lock screen ---------- */
  .lock{position:fixed;inset:0;background:linear-gradient(160deg,var(--bg-grad-1),#155e63 60%,#0c4a6e);
    display:flex;align-items:center;justify-content:center;padding:24px;z-index:100}
  .lock-card{background:#fff;border-radius:24px;padding:30px 24px;width:100%;max-width:380px;
    box-shadow:0 20px 60px rgba(0,0,0,.3);text-align:center;animation:pop .3s ease}
  @keyframes pop{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
  .lock-logo{width:64px;height:64px;border-radius:18px;margin:0 auto 16px;
    background:linear-gradient(135deg,var(--bg-grad-1),var(--bg-grad-2));color:#fff;
    display:grid;place-items:center;font-size:32px;font-weight:800}
  .lock-card h2{margin:0 0 6px;font-size:21px}
  .lock-card p{margin:0 0 22px;color:var(--muted);font-size:14px;line-height:1.5}
  .lock-card .control{width:100%;padding:13px 14px;border:1.5px solid var(--line);
    border-radius:13px;font-size:16px;text-align:center;background:#f8fafc;margin-bottom:8px}
  .lock-card .control:focus{outline:none;border-color:var(--primary);background:#fff}
  .lock-err{color:var(--red);font-size:13px;font-weight:600;min-height:18px;margin-bottom:8px}

  /* ---------- Modal ---------- */
  .modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);z-index:90;display:none;
    align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
  .modal-bg.show{display:flex;animation:fade .2s}
  .modal{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:680px;
    padding:22px 20px calc(22px + env(safe-area-inset-bottom));animation:slideup .28s ease}
  @keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
  .modal-grip{width:40px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 16px}
  .modal h3{margin:0 0 2px;font-size:18px}
  .modal .msub{margin:0 0 18px;color:var(--muted);font-size:13px}
  .modal-actions{display:flex;gap:10px;margin-top:6px}
  .modal-actions .btn{margin-top:0}

  /* ---------- Toast ---------- */
  .toast-wrap{position:fixed;bottom:20px;left:0;right:0;z-index:120;display:flex;
    flex-direction:column;align-items:center;gap:8px;pointer-events:none;padding:0 16px}
  .toast{background:var(--ink);color:#fff;padding:12px 18px;border-radius:13px;font-size:14px;
    font-weight:600;box-shadow:var(--shadow);max-width:420px;width:100%;text-align:center;
    animation:toastin .3s ease;display:flex;align-items:center;gap:9px;justify-content:center}
  .toast.ok{background:#15803d}.toast.err{background:#b91c1c}
  @keyframes toastin{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}

  /* ---------- Loading / states ---------- */
  .spinner{width:18px;height:18px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;
    border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
  .spinner.dark{border-color:rgba(15,118,110,.25);border-top-color:var(--primary)}
  @keyframes spin{to{transform:rotate(360deg)}}
  .center-state{text-align:center;padding:48px 20px;color:var(--muted)}
  .center-state .big{font-size:40px;margin-bottom:10px}
  .center-state p{margin:6px 0 0;font-size:14px}
  .skeleton{background:linear-gradient(90deg,#eef2f7 25%,#e2e8f0 37%,#eef2f7 63%);
    background-size:400% 100%;animation:shimmer 1.3s infinite;border-radius:14px;
    height:120px;margin-bottom:14px}
  @keyframes shimmer{0%{background-position:100% 0}100%{background-position:-100% 0}}
  .hidden{display:none !important}
</style>
</head>
<body>

<!-- ===== Lock screen ===== -->
<div class="lock" id="lockScreen">
  <div class="lock-card">
    <div class="lock-logo">₹</div>
    <h2>Rent Manager</h2>
    <p>Enter your access key to manage rent collections.</p>
    <input class="control" id="keyInput" type="password" placeholder="Access key" autocomplete="off" />
    <div class="lock-err" id="lockErr"></div>
    <button class="btn" id="unlockBtn" onclick="unlock()">Unlock</button>
  </div>
</div>

<!-- ===== Main app ===== -->
<div class="app" id="app" style="display:none">
  <header class="topbar">
    <div class="topbar-row">
      <div class="logo">₹</div>
      <div class="brand">
        <h1>Rent Manager</h1>
        <p id="topSub">Tap a shed to record payment</p>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" title="Refresh" onclick="loadData(true)">⟳</button>
        <button class="icon-btn" title="Settings" onclick="openSettings()">⚙</button>
      </div>
    </div>
    <nav class="tabs">
      <button class="tab active" id="tab-home" onclick="switchTab('home')">🏠 Dashboard</button>
      <button class="tab" id="tab-history" onclick="switchTab('history')">📜 History</button>
    </nav>
  </header>

  <main class="content">
    <!-- Dashboard -->
    <section class="view active" id="view-home">
      <div class="stats" id="stats"></div>
      <div class="section-title">Record a payment</div>
      <div id="sheds"></div>
    </section>

    <!-- History -->
    <section class="view" id="view-history">
      <div class="filters" id="filters"></div>
      <input class="search" id="search" type="text" placeholder="🔍  Search month…" oninput="renderHistory()" />
      <div id="historyBody"></div>
    </section>
  </main>
</div>

<!-- ===== Payment modal ===== -->
<div class="modal-bg" id="modalBg" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal"></div>
</div>

<!-- ===== Settings modal ===== -->
<div class="modal-bg" id="settingsBg" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <div class="modal-grip"></div>
    <h3>Settings</h3>
    <p class="msub">Manage your access and data.</p>
    <div class="field" style="margin-bottom:14px">
      <label>Access key</label>
      <div class="control" id="keyMask" style="background:#f1f5f9;color:var(--muted)"></div>
    </div>
    <button class="btn ghost" onclick="loadData(true);closeSettings()" style="margin-bottom:10px">⟳ Refresh data</button>
    <button class="btn danger" onclick="lockApp()">🔒 Lock app</button>
    <p style="text-align:center;color:var(--muted);font-size:12px;margin:16px 0 0">Rent Manager • Data stored in Google Sheets</p>
  </div>
</div>

<div class="toast-wrap" id="toastWrap"></div>

<script>
/* ========================================================================
   Rent Manager — front-end logic (vanilla JS, no dependencies)
   ======================================================================== */
const KEY_STORAGE = "rent_api_key";
let API_KEY = localStorage.getItem(KEY_STORAGE) || "";
let DATA = null;            // { month_col, sheds:[], rows:[] }
let activeTab = "home";
let historyFilter = 0;      // 0 = all, else shed id

/* ---------- API helpers ---------- */
async function api(path, opts = {}) {
  const headers = Object.assign({ "x-api-key": API_KEY }, opts.headers || {});
  if (opts.body) headers["Content-Type"] = "application/json";
  const res = await fetch(path, Object.assign({}, opts, { headers }));
  let json = null;
  try { json = await res.json(); } catch (e) {}
  if (!res.ok) {
    const msg = (json && (json.error || json.message)) || ("Error " + res.status);
    const err = new Error(msg); err.status = res.status; throw err;
  }
  return json;
}

/* ---------- Unlock flow ---------- */
async function unlock() {
  const input = document.getElementById("keyInput");
  const errEl = document.getElementById("lockErr");
  const btn = document.getElementById("unlockBtn");
  const key = input.value.trim();
  if (!key) { errEl.textContent = "Please enter your key."; return; }
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Checking…';
  errEl.textContent = "";
  try {
    const prev = API_KEY; API_KEY = key;
    await api("/api/verify");
    localStorage.setItem(KEY_STORAGE, key);
    document.getElementById("lockScreen").style.display = "none";
    document.getElementById("app").style.display = "flex";
    await loadData();
  } catch (e) {
    errEl.textContent = e.status === 401 ? "Wrong key. Try again." : ("Could not connect: " + e.message);
  } finally {
    btn.disabled = false; btn.textContent = "Unlock";
  }
}
document.getElementById("keyInput").addEventListener("keydown", e => { if (e.key === "Enter") unlock(); });

function lockApp() {
  localStorage.removeItem(KEY_STORAGE);
  API_KEY = ""; DATA = null;
  closeSettings();
  document.getElementById("app").style.display = "none";
  document.getElementById("lockScreen").style.display = "flex";
  document.getElementById("keyInput").value = "";
}

/* ---------- Data loading ---------- */
function showSkeletons() {
  document.getElementById("sheds").innerHTML =
    '<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';
  document.getElementById("stats").innerHTML = "";
}

async function loadData(isRefresh) {
  if (!DATA) showSkeletons();
  try {
    DATA = await api("/api/records");
    renderStats();
    renderSheds();
    renderFilters();
    renderHistory();
    if (isRefresh) toast("Data refreshed", "ok");
  } catch (e) {
    if (e.status === 401) { lockApp(); return; }
    document.getElementById("sheds").innerHTML =
      `<div class="center-state"><div class="big">⚠️</div><p><b>Couldn't load data</b></p><p>${esc(e.message)}</p>
       <button class="btn ghost" style="max-width:200px;margin:16px auto 0" onclick="loadData(true)">Try again</button></div>`;
    document.getElementById("stats").innerHTML = "";
  }
}

/* ---------- Derived helpers ---------- */
function nextDueMonth(shedId) {
  for (const r of DATA.rows) {
    if (!r.cells[shedId].paid) return r.month;
  }
  return null;
}
function unpaidMonths(shedId) {
  return DATA.rows.filter(r => !r.cells[shedId].paid).map(r => r.month);
}
function lastPaid(shedId) {
  let last = null;
  for (const r of DATA.rows) {
    const c = r.cells[shedId];
    if (c.paid) last = { month: r.month, amount: c.amount, date: c.date };
  }
  return last;
}
function totalCollected() {
  let sum = 0;
  for (const r of DATA.rows)
    for (const s of DATA.sheds) {
      const v = parseFloat(String(r.cells[s.id].amount).replace(/[^0-9.]/g, ""));
      if (!isNaN(v)) sum += v;
    }
  return sum;
}
function pendingCount() {
  let n = 0;
  for (const r of DATA.rows)
    for (const s of DATA.sheds)
      if (!r.cells[s.id].paid) n++;
  return n;
}

/* ---------- Formatting ---------- */
function fmtMoney(n) {
  return "₹" + Math.round(n).toLocaleString("en-IN");
}
function esc(s) {
  return String(s == null ? "" : s).replace(/[&<>"']/g, c =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}
function todayInput() {
  const d = new Date();
  const p = n => String(n).padStart(2, "0");
  return d.getFullYear() + "-" + p(d.getMonth() + 1) + "-" + p(d.getDate());
}
/* Convert the date input (YYYY-MM-DD) to match the format already used in the
   sheet's date column, so new entries look consistent. Defaults to DD-MM-YYYY. */
function formatDateForSheet(isoStr, shedId) {
  if (!isoStr) return "";
  const [y, m, d] = isoStr.split("-");
  let sep = "-", order = "dmy";
  if (DATA) {
    for (const r of DATA.rows) {
      const v = r.cells[shedId] && r.cells[shedId].date;
      if (v && /\d/.test(v)) {
        if (v.indexOf("/") > -1) sep = "/";
        else if (v.indexOf("-") > -1) sep = "-";
        else if (v.indexOf(".") > -1) sep = ".";
        const parts = v.split(/[\/\-.]/);
        if (parts[0] && parts[0].length === 4) order = "ymd";
        else order = "dmy";
        break;
      }
    }
  }
  if (order === "ymd") return [y, m, d].join(sep);
  return [d, m, y].join(sep);
}

/* ---------- Render: stats ---------- */
function renderStats() {
  const pend = pendingCount();
  document.getElementById("stats").innerHTML = `
    <div class="stat green"><div class="val">${fmtMoney(totalCollected())}</div><div class="lbl">Collected</div></div>
    <div class="stat amber"><div class="val">${pend}</div><div class="lbl">Pending</div></div>
    <div class="stat"><div class="val">${DATA.sheds.length}</div><div class="lbl">Sheds</div></div>`;
  document.getElementById("topSub").textContent =
    pend > 0 ? `${pend} payment${pend > 1 ? "s" : ""} pending` : "All caught up 🎉";
}

/* ---------- Render: dashboard shed cards ---------- */
function renderSheds() {
  const wrap = document.getElementById("sheds");
  wrap.innerHTML = "";
  DATA.sheds.forEach(s => {
    const due = nextDueMonth(s.id);
    const last = lastPaid(s.id);
    const unpaid = unpaidMonths(s.id);
    const card = document.createElement("div");
    card.className = "shed";

    const pill = due
      ? `<span class="pill due">● Due: ${esc(due)}</span>`
      : `<span class="pill ok">✓ All paid</span>`;
    const lastTxt = last
      ? `Last paid ${fmtMoney(parseFloat(String(last.amount).replace(/[^0-9.]/g,""))||0)}`
      : "No payments yet";

    let body;
    if (!due) {
      body = `<div class="all-paid">✓ Every month is paid for this shed</div>`;
    } else {
      const opts = unpaid.map(m =>
        `<option value="${esc(m)}" ${m===due?"selected":""}>${esc(m)}</option>`).join("");
      const prefill = last ? (String(last.amount).replace(/[^0-9.]/g,"")) : "";
      body = `
      <div class="shed-body">
        <div class="field-row">
          <div class="field">
            <label>Month</label>
            <select class="control" id="m-${s.id}">${opts}</select>
          </div>
        </div>
        <div class="field-row">
          <div class="field">
            <label>Amount</label>
            <div class="amt-wrap"><span class="rs">₹</span>
              <input class="control" id="a-${s.id}" type="number" inputmode="numeric"
                     placeholder="0" value="${esc(prefill)}" /></div>
          </div>
          <div class="field">
            <label>Paid date</label>
            <input class="control" id="d-${s.id}" type="date" value="${todayInput()}" />
          </div>
        </div>
        <button class="btn" id="btn-${s.id}" onclick="quickPay(${s.id})">✓ Record Payment</button>
      </div>`;
    }

    card.innerHTML = `
      <div class="shed-head">
        <div class="shed-ic c${s.id}">🏠</div>
        <div class="shed-meta">
          <div class="shed-name-row">
            <span class="shed-name">${esc(s.label)}</span>
            ${pill}
          </div>
          <div class="shed-sub">${esc(lastTxt)}</div>
        </div>
      </div>
      ${body}`;
    wrap.appendChild(card);
  });
}

/* ---------- Record payment from dashboard ---------- */
async function quickPay(shedId) {
  const shed = DATA.sheds.find(s => s.id === shedId);
  const month = document.getElementById("m-" + shedId).value;
  const amount = document.getElementById("a-" + shedId).value.trim();
  const dateIso = document.getElementById("d-" + shedId).value;
  const btn = document.getElementById("btn-" + shedId);
  if (!amount || parseFloat(amount) <= 0) { toast("Enter a valid amount", "err"); return; }
  if (!dateIso) { toast("Pick a paid date", "err"); return; }
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving…';
  try {
    await submitPayment(shed, month, amount, formatDateForSheet(dateIso, shedId));
    toast(`${shed.label}: ${fmtMoney(parseFloat(amount))} recorded for ${month}`, "ok");
    await loadData();
  } catch (e) {
    btn.disabled = false; btn.innerHTML = "✓ Record Payment";
    toast("Failed: " + e.message, "err");
  }
}

async function submitPayment(shed, month, amount, paidDate) {
  const res = await api("/api/update", {
    method: "POST",
    body: JSON.stringify({
      updates: [{ month, amt_col: shed.amt_col, date_col: shed.date_col,
                  amount: String(amount), paid_date: paidDate }]
    })
  });
  const r = (res.results || [])[0];
  if (!r || r.status !== "ok") throw new Error((r && r.reason) || "update rejected");
  return r;
}

/* ---------- History view ---------- */
function renderFilters() {
  const f = document.getElementById("filters");
  let html = `<button class="chip ${historyFilter===0?"active":""}" onclick="setFilter(0)">All sheds</button>`;
  DATA.sheds.forEach(s => {
    html += `<button class="chip ${historyFilter===s.id?"active":""}" onclick="setFilter(${s.id})">${esc(s.label)}</button>`;
  });
  f.innerHTML = html;
}
function setFilter(id) { historyFilter = id; renderFilters(); renderHistory(); }

function renderHistory() {
  if (!DATA) return;
  const q = (document.getElementById("search").value || "").toLowerCase().trim();
  const rows = DATA.rows.filter(r => !q || r.month.toLowerCase().includes(q));
  const sheds = historyFilter ? DATA.sheds.filter(s => s.id === historyFilter) : DATA.sheds;
  const body = document.getElementById("historyBody");

  if (rows.length === 0) {
    body.innerHTML = `<div class="center-state"><div class="big">🗓️</div><p>No months found</p></div>`;
    return;
  }

  let head = "<tr><th>Month</th>" + sheds.map(s => `<th>${esc(s.label)}</th>`).join("") + "</tr>";
  let trs = rows.map(r => {
    let tds = `<td class="mcell">${esc(r.month)}</td>`;
    sheds.forEach(s => {
      const c = r.cells[s.id];
      const inner = c.paid
        ? `<div class="amt">₹${esc(fmtNum(c.amount))}</div><div class="dt">${esc(c.date || "—")}</div>`
        : `<span class="pending">+ Add</span>`;
      tds += `<td class="cell" onclick="openPayModal(${s.id},'${esc(r.month).replace(/'/g,"\\'")}')">${inner}</td>`;
    });
    return "<tr>" + tds + "</tr>";
  }).join("");

  body.innerHTML = `<div class="table-wrap"><table><thead>${head}</thead><tbody>${trs}</tbody></table></div>
    <div class="legend"><span><span class="dot g"></span>Paid</span><span><span class="dot a"></span>Pending</span></div>
    <div class="tap-hint">Tap any cell to add or edit a payment</div>`;
}
function fmtNum(v) {
  const n = parseFloat(String(v).replace(/[^0-9.]/g, ""));
  return isNaN(n) ? esc(v) : Math.round(n).toLocaleString("en-IN");
}

/* ---------- Payment modal (from history) ---------- */
function openPayModal(shedId, month) {
  const shed = DATA.sheds.find(s => s.id === shedId);
  const row = DATA.rows.find(r => r.month === month);
  const cell = row.cells[shedId];
  const existing = cell.paid;
  const amt = existing ? String(cell.amount).replace(/[^0-9.]/g, "") : "";
  const m = document.getElementById("modal");
  m.innerHTML = `
    <div class="modal-grip"></div>
    <h3>${esc(shed.label)}</h3>
    <p class="msub">${existing ? "Edit payment" : "Record payment"} for <b>${esc(month)}</b></p>
    <div class="field-row">
      <div class="field">
        <label>Amount</label>
        <div class="amt-wrap"><span class="rs">₹</span>
          <input class="control" id="mAmt" type="number" inputmode="numeric" placeholder="0" value="${esc(amt)}" /></div>
      </div>
      <div class="field">
        <label>Paid date</label>
        <input class="control" id="mDate" type="date" value="${todayInput()}" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" onclick="closeModal()">Cancel</button>
      <button class="btn" id="mBtn" onclick="modalPay(${shedId},'${esc(month).replace(/'/g,"\\'")}')">✓ Save</button>
    </div>`;
  document.getElementById("modalBg").classList.add("show");
  setTimeout(() => document.getElementById("mAmt").focus(), 250);
}
function closeModal() { document.getElementById("modalBg").classList.remove("show"); }

async function modalPay(shedId, month) {
  const shed = DATA.sheds.find(s => s.id === shedId);
  const amount = document.getElementById("mAmt").value.trim();
  const dateIso = document.getElementById("mDate").value;
  const btn = document.getElementById("mBtn");
  if (!amount || parseFloat(amount) <= 0) { toast("Enter a valid amount", "err"); return; }
  if (!dateIso) { toast("Pick a paid date", "err"); return; }
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Saving…';
  try {
    await submitPayment(shed, month, amount, formatDateForSheet(dateIso, shedId));
    closeModal();
    toast(`${shed.label}: ${fmtMoney(parseFloat(amount))} saved for ${month}`, "ok");
    await loadData();
  } catch (e) {
    btn.disabled = false; btn.innerHTML = "✓ Save";
    toast("Failed: " + e.message, "err");
  }
}

/* ---------- Tabs / settings ---------- */
function switchTab(t) {
  activeTab = t;
  document.getElementById("tab-home").classList.toggle("active", t === "home");
  document.getElementById("tab-history").classList.toggle("active", t === "history");
  document.getElementById("view-home").classList.toggle("active", t === "home");
  document.getElementById("view-history").classList.toggle("active", t === "history");
}
function openSettings() {
  const k = API_KEY || "";
  document.getElementById("keyMask").textContent =
    k.length > 4 ? "••••••••" + k.slice(-4) : "••••";
  document.getElementById("settingsBg").classList.add("show");
}
function closeSettings() { document.getElementById("settingsBg").classList.remove("show"); }

/* ---------- Toast ---------- */
function toast(msg, type) {
  const wrap = document.getElementById("toastWrap");
  // If a bottom-sheet modal is open, show the toast at the top so it doesn't
  // cover the modal's action buttons.
  const modalOpen = document.querySelector(".modal-bg.show");
  wrap.style.bottom = modalOpen ? "auto" : "20px";
  wrap.style.top = modalOpen ? "20px" : "auto";
  const t = document.createElement("div");
  t.className = "toast " + (type || "");
  t.innerHTML = (type === "ok" ? "✓ " : type === "err" ? "✕ " : "") + esc(msg);
  wrap.appendChild(t);
  setTimeout(() => { t.style.opacity = "0"; t.style.transition = ".3s"; setTimeout(() => t.remove(), 300); }, 2600);
}

/* ---------- Boot ---------- */
(async function init() {
  if (API_KEY) {
    try {
      await api("/api/verify");
      document.getElementById("lockScreen").style.display = "none";
      document.getElementById("app").style.display = "flex";
      await loadData();
    } catch (e) {
      // stored key invalid or server unreachable -> show lock
      if (e.status === 401) localStorage.removeItem(KEY_STORAGE);
      document.getElementById("lockScreen").style.display = "flex";
    }
  } else {
    document.getElementById("lockScreen").style.display = "flex";
  }
})();
</script>
